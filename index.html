<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #comic-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        #comic-loading {
            color: #888;
            font-size: 16px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        img#comic {
            display: none;
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        img#comic.loaded {
            display: block;
        }

        /* Extra bottom padding raises the bar above GMod's native UI overlay */
        #progress-area {
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            border-top: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 40px 90px;
        }

        #bar-background {
            width: 100%;
            height: 25px;
            background-color: #1a1a1a;
            border: 1px solid #555;
            overflow: hidden;
            position: relative;
            margin-bottom: 10px;
        }

        #bar-fill {
            width: 0%;
            height: 100%;
            background-color: #f7931e;
            transition: width 0.1s linear;
        }

        #bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 25px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000;
        }

        #status-ticker {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="comic-container">
        <span id="comic-loading">Fetching comic...</span>
        <img id="comic" src="" alt="">
    </div>

    <div id="progress-area">
        <div id="bar-background">
            <div id="bar-fill"></div>
            <div id="bar-text">Waiting for Server... (0%)</div>
        </div>
        <div id="status-ticker">Establishing Connection...</div>
    </div>

    <script>
        // ==========================================
        // FEATURE 1: RANDOM XKCD COMIC
        // Uses the xkcd JSON API so we get structured data directly
        // instead of trying to scrape HTML through a proxy.
        // Two proxies are tried in order so one can cover the other's outages.
        // ==========================================

        function fetchWithTimeout(url, ms) {
            var controller = new AbortController();
            var id = setTimeout(function() { controller.abort(); }, ms);
            return fetch(url, { signal: controller.signal }).finally(function() {
                clearTimeout(id);
            });
        }

        function fetchXkcdJson(comicUrl) {
            var encoded = encodeURIComponent(comicUrl);
            var proxies = [
                "https://corsproxy.io/?url=" + encoded,
                "https://api.allorigins.win/get?url=" + encoded,
            ];

            function tryNext(i) {
                if (i >= proxies.length) {
                    return Promise.reject(new Error("All proxies failed"));
                }
                return fetchWithTimeout(proxies[i], 6000)
                    .then(function(res) {
                        if (!res.ok) throw new Error("HTTP " + res.status);
                        return res.json();
                    })
                    .then(function(data) {
                        // allorigins wraps JSON in { contents: "..." }; corsproxy returns raw
                        return data.contents ? JSON.parse(data.contents) : data;
                    })
                    .catch(function() { return tryNext(i + 1); });
            }

            return tryNext(0);
        }

        function showFallback() {
            var img = document.getElementById("comic");
            img.onload = function() {
                document.getElementById("comic-loading").style.display = "none";
                img.classList.add("loaded");
            };
            img.onerror = function() {
                document.getElementById("comic-loading").textContent = "Comic unavailable";
            };
            img.src = "https://imgs.xkcd.com/comics/barrels_of_fun.png";
        }

        fetchXkcdJson("https://xkcd.com/info.0.json")
            .then(function(latest) {
                var maxNum = latest.num;
                var randomNum;
                do {
                    randomNum = Math.floor(Math.random() * maxNum) + 1;
                } while (randomNum === 404); // comic 404 doesn't exist

                return fetchXkcdJson("https://xkcd.com/" + randomNum + "/info.0.json");
            })
            .then(function(comic) {
                var img = document.getElementById("comic");
                img.onload = function() {
                    document.getElementById("comic-loading").style.display = "none";
                    img.classList.add("loaded");
                };
                img.onerror = showFallback;
                img.src = comic.img;
                img.alt = comic.alt;
            })
            .catch(function(err) {
                console.error("Failed to fetch comic:", err);
                showFallback();
            });

        // ==========================================
        // FEATURE 2: GMOD PROGRESS CALLBACKS
        // ==========================================

        var filesTotal = 0;
        var filesNeeded = 0;

        var barFill   = document.getElementById("bar-fill");
        var barText   = document.getElementById("bar-text");
        var statusTicker = document.getElementById("status-ticker");

        function updateProgressBar() {
            var pct = filesTotal > 0
                ? Math.floor(((filesTotal - filesNeeded) / filesTotal) * 100)
                : 0;
            barFill.style.width = pct + "%";
            barText.textContent = "Loading... (" + pct + "%)";
        }

        function SetFilesTotal(total) {
            filesTotal = total;
            filesNeeded = total;
            updateProgressBar();
        }

        function DownloadingFile(fileName) {
            statusTicker.textContent = "Downloading: " + fileName;
        }

        function SetFilesNeeded(needed) {
            filesNeeded = needed;
            updateProgressBar();
        }

        function SetStatusChanged(status) {
            if (status.indexOf("Mounting") > -1 || status.indexOf("Starting") > -1) {
                barFill.style.width = "100%";
                barText.textContent = "Loading... (100%)";
            }
            statusTicker.textContent = status;
        }
    </script>
</body>
</html>
