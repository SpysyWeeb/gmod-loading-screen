<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            flex-direction: column; /* Stack comic and bar vertically */
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* Classic GMod vibe */
            user-select: none; /* Prevent text selection */
        }

        /* --- Comic Display Styling --- */
        #comic-container {
            flex: 1; /* Occupy all remaining space */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            height: 100%;
        }

        img#comic {
            max-width: 90%; /* Leave a small margin */
            max-height: 80vh; /* Don't hit the progress bar */
            object-fit: contain;
            border: 2px solid #ffffff; /* Frame the comic */
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* --- GMod Progress Bar Styling --- */
        #progress-area {
            width: 100%;
            height: 100px;
            background-color: rgba(20, 20, 20, 0.9);
            border-top: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 40px;
        }

        /* The background bar */
        #bar-background {
            width: 100%;
            height: 25px;
            background-color: #1a1a1a;
            border: 1px solid #555;
            overflow: hidden;
            position: relative;
            margin-bottom: 10px;
        }

        /* The actual progress color */
        #bar-fill {
            width: 0%; /* Starts at 0 */
            height: 100%;
            background-color: #f7931e; /* Classic GMod orange */
            transition: width 0.1s linear; /* Smooth movement */
        }

        /* Text overlaying the bar (Percentage) */
        #bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 25px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000;
        }

        /* Sub-status text (filename) */
        #status-ticker {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- 1. Middle Area: Comic -->
    <div id="comic-container">
        <img id="comic" src="" alt="Fetching random comic...">
    </div>

    <!-- 2. Bottom Area: GMod Progress -->
    <div id="progress-area">
        <div id="bar-background">
            <div id="bar-fill"></div>
            <div id="bar-text">Waiting for Server... (0%)</div>
        </div>
        <div id="status-ticker">Establishing Connection...</div>
    </div>

    <script>
        // ==========================================
        // FEATURE 1: RANDOM XKCD FETCHING
        // ==========================================
        function fetchComic() {
            // A simple CORS proxy to fetch and read the raw HTML of xkcd.com
            const proxyUrl = "https://api.allorigins.win/get?url=";
            const targetUrl = encodeURIComponent("https://c.xkcd.com/random/comic/");

            fetch(proxyUrl + targetUrl)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Network response error.');
                })
                .then(data => {
                    // Parse the raw HTML we just fetched
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(data.contents, 'text/html');
                    
                    // Locate the comic image asset inside xkcd's page structure
                    const comicImg = doc.querySelector('#comic img');
                    
                    if (comicImg && comicImg.src) {
                        // Apply the raw image link to our local img tag
                        document.getElementById('comic').src = comicImg.src;
                    }
                })
                .catch(err => {
                    console.error("Failed to fetch comic:", err);
                    // Fallback image in case the scrape fails
                    document.getElementById('comic').src = "https://imgs.xkcd.com/comics/barrels_of_fun.png";
                });
        }
        
        // Trigger the comic fetch immediately when the page loads
        fetchComic();


        // ==========================================
        // FEATURE 2: GMOD PROGRESS CALLBACKS
        // ==========================================
        
        // Internal variables to track progress state
        var filesTotal = 0;
        var filesNeeded = 0;
        var progressPercent = 0;

        // UI references
        const barFill = document.getElementById('bar-fill');
        const barText = document.getElementById('bar-text');
        const statusTicker = document.getElementById('status-ticker');

        /**
         * Helper: Recalculates and updates the UI
         */
        function updateProgressBar() {
            if (filesTotal > 0) {
                // Calculation: (Total - Remaining) / Total
                progressPercent = Math.floor(((filesTotal - filesNeeded) / filesTotal) * 100);
            } else {
                progressPercent = 0;
            }

            // Apply percentage to the visual width and text label
            barFill.style.width = progressPercent + "%";
            barText.innerHTML = "Loading... (" + progressPercent + "%)";
        }

        // --- NATIVE GMOD CALLBACK FUNCTIONS (MUST USE THESE NAMES) ---

        /**
         * Called ONCE when the connection handshake is complete.
         * 'total' is the integer count of *all* files the client needs to connect.
         */
        function SetFilesTotal(total) {
            filesTotal = total;
            // The initial need is equal to the initial total
            filesNeeded = total;
            updateProgressBar();
        }

        /**
         * Called every time a *new* file transfer begins.
         * 'fileName' is the path of the asset (e.g., "maps/ph_office_v2.bsp")
         */
        function DownloadingFile(fileName) {
            statusTicker.innerHTML = "Downloading: " + fileName;
        }

        /**
         * Called when *any* pending asset finishes transferring.
         * 'needed' is the remaining number of files the client still requires.
         */
        function SetFilesNeeded(needed) {
            filesNeeded = needed;
            updateProgressBar();
        }

        /**
         * Called when the engine changes states (e.g., "Mounting Addons", "Creating Lua...").
         * 'status' is the raw string from the gray GMod engine status box.
         */
        function SetStatusChanged(status) {
            // When we start mounting, files are done, so force the bar to 100%
            if (status.indexOf("Mounting") > -1 || status.indexOf("Starting") > -1) {
                barFill.style.width = "100%";
                barText.innerHTML = "Loading... (100%)";
            }
            statusTicker.innerHTML = status;
        }
    </script>
</body>
</html>
